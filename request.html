<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELPCARE24 - Submit Request</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="card">

<div class="logo-circle">📝</div>

<h1>Submit Request</h1>

<p>Fill your details carefully. Our support team will review your request.</p>

<form id="supportForm">

<input type="tel" id="mobile" placeholder="📱 Mobile Number" required>

<input type="email" id="email" placeholder="📧 Email Address" required>

<input type="text" id="userid" placeholder="🆔 Game User ID / Account ID" required>

<textarea id="description" placeholder="📝 Describe your problem..." required></textarea>

<button type="submit">
<i class="fa-solid fa-paper-plane"></i>
SUBMIT REQUEST
</button>

</form>

<a href="index.html" class="btn request" style="margin-top:20px;">
<i class="fa-solid fa-arrow-left"></i>
BACK TO HOME
</a>

</div>

<script>
document.getElementById("supportForm").addEventListener("submit",async function(e){

e.preventDefault();

const mobile=document.getElementById("mobile").value;
const email=document.getElementById("email").value;
const userid=document.getElementById("userid").value;
const description=document.getElementById("description").value;

const telegramMessage=`🚨 New Support Request

📱 Mobile : ${mobile}

📧 Email : ${email}

🆔 User ID : ${userid}

📝 Problem :
${description}

🕒 ${new Date().toLocaleString("en-IN")}`;

const botToken="YOUR_BOT_TOKEN";
const chatId="YOUR_CHAT_ID";

try{

const response=await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

chat_id:chatId,

text:telegramMessage

})

});

const result=await response.json();

if(result.ok){

alert("✅ Request Submitted Successfully!\n\n⏳ Please wait up to 2 hours.\nOur support team will contact you soon.");

document.getElementById("supportForm").reset();

}else{

alert("Telegram Error : "+result.description);

}

}catch{

alert("Network Error! Please try again.");

}

});
</script>

</body>
</html>
