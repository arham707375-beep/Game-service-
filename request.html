    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Support Request</h1>
        <form id="supportForm" onsubmit="sendToTelegram(event)">
            <input id="name" placeholder="Full Name" required>
            <input id="mobile" placeholder="Mobile Number" required>
            <input type="email" id="email" placeholder="Email" required>
            <input id="userId" placeholder="User ID">
            <textarea id="issue" placeholder="Describe your issue"></textarea>
            <button type="submit" class="btn req">Submit Request</button>
        </form>
        <p><a href="index.html">⬅ Back</a></p>
    </div>

    <script>
        function sendToTelegram(event) {
            event.preventDefault(); // पेज को रिफ्रेश होने से रोकने के लिए

            // ⚠️ यहाँ अपनी डिटेल्स डालें
            const botToken = "8773997207:AAEkI6j5yz9vyuvxUBu4GzWxEFEHDE4GCbs"; //
            const chatId = "7643342967";     // 

            // फॉर्म से डेटा निकालना
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const email = document.getElementById('email').value;
            const userId = document.getElementById('userId').value || 'Not Provided';
            const issue = document.getElementById('issue').value || 'No Description';

            // टेलीग्राम पर दिखने वाला मैसेज फॉर्मेट
            const message = `📩 *New Support Request*\n\n` +
                            `👤 *Name:* ${name}\n` +
                            `📱 *Mobile:* ${mobile}\n` +
                            `📧 *Email:* ${email}\n` +
                            `🆔 *User ID:* ${userId}\n` +
                            `📝 *Issue:* ${issue}`;

            // टेलीग्राम API URL
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;

            // डेटा भेजने की प्रोसेस
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown' // मैसेज को बोल्ड/सुंदर दिखाने के लिए
                })
            })
            .then(response => {
                if (response.ok) {
                    alert('Request submitted successfully to Telegram!');
                    document.getElementById('supportForm').reset(); // फॉर्म खाली करने के लिए
                } else {
                    alert('Error sending request. Please check Bot Token or Chat ID.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Something went wrong!');
            });
        }
    </script>
</body>
</html
