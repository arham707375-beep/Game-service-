<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Support Request</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#007bff;
}

input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
background:#0088cc;
color:#fff;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#006fa3;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h1>Submit Support Request</h1>

<form id="supportForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="userid" placeholder="User ID" required>

<textarea id="problem" rows="5" placeholder="Describe Your Problem" required></textarea>

<button type="submit">Submit Request</button>

</form>

</div>
</div>

<script>

const botToken="PASTE_YOUR_BOT_TOKEN_HERE";
const chatId="PASTE_YOUR_CHAT_ID_HERE";

document.getElementById("supportForm").addEventListener("submit",function(e){

e.preventDefault();

const message=
`📩 New Support Request

👤 Name : ${name.value}
📞 Mobile : ${mobile.value}
📧 Email : ${email.value}
🆔 User ID : ${userid.value}

📝 Problem :
${problem.value}`;

fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chatId,
text:message
})
})
.then(()=>{
alert("✅ Request Submitted Successfully!\n\nPlease wait 2 hours.\nOur support team will contact you soon.");
document.getElementById("supportForm").reset();
})
.catch(()=>{
alert("Error! Check Bot Token or Chat ID.");
});

});

</script>

</body>
</html>
